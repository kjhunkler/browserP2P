<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=4, user-scalable=yes, viewport-fit=cover" />
  <meta name="theme-color" content="#12121f" />
  <title>ClasslessRPG</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/robot.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/robot.svg" />
  <link rel="stylesheet" href="css/style.css?v=2.6.1" />
</head>
<body>
  <div id="app">

    <!-- ===== Menu ===== -->
    <section id="screen-menu" class="screen active">
      <button id="btn-menu-settings" class="hud-btn hud-top-left" aria-label="Settings">⚙️</button>
      <h1 class="title">Classless<span>RPG</span></h1>
      <p id="menu-version" class="menu-version"></p>
      <p class="tagline">Choose a realm, join with a code, or host your own table.</p>

      <div class="code-card">
        <div class="code-card-title">Join / host with code</div>
        <div class="join-row">
          <input id="code-input" class="code-input" maxlength="12" autocapitalize="characters"
                 autocomplete="off" placeholder="CODE" inputmode="text" />
          <button id="btn-join" class="btn">Join</button>
        </div>
        <button id="btn-host" class="btn btn-primary">Host with this code</button>
        <p id="join-status" class="status"></p>
      </div>

      <div class="divider"><span>elemental lobbies</span></div>

      <div id="lobby-grid" class="lobby-grid" aria-live="polite"></div>

      <button id="btn-refresh-lobbies" class="btn btn-small">Refresh lobbies</button>
    </section>

    <!-- ===== Lobby (host) ===== -->
    <section id="screen-lobby" class="screen">
      <h2>Players join with this code</h2>
      <div class="code-big" id="lobby-code">----</div>
      <div id="qr" class="qr"></div>
      <p class="join-url-label">or open <span id="join-url"></span></p>

      <h3><span id="player-count">0</span> in the lobby</h3>
      <ul id="player-list" class="player-list"></ul>

      <button id="btn-start" class="btn btn-primary">Start</button>
      <button id="btn-lobby-settings" class="hud-btn hud-top-left" aria-label="Settings">⚙️</button>
    </section>

    <!-- ===== Play ===== -->
    <section id="screen-play" class="screen">
      <div class="play-menu-bar" aria-label="Play controls">
        <label class="game-picker" for="game-select">
          <span>Game</span>
          <select id="game-select" aria-label="Choose game">
            <option value="free-play">Free play</option>
            <option value="digger">Deep Digger</option>
            <option value="air-hockey">Air Hockey</option>
            <option value="paint-panic">Paint Panic</option>
            <option value="tower">Tower Tumble</option>
            <option value="snow-brawl">Snow Brawl Royale</option>
            <option value="gentle-rain">A Gentle Rain</option>
          </select>
        </label>
        <button id="btn-camera" class="menu-icon-btn" aria-label="Camera" type="button">📹</button>
        <button id="btn-mic" class="menu-icon-btn" aria-label="Record voice" type="button">🎤</button>
        <button id="btn-chat" class="menu-icon-btn" aria-label="Chat" type="button">
          💬<span id="chat-badge" class="badge hidden">0</span>
        </button>
        <button id="btn-profile" class="menu-icon-btn menu-settings-btn" aria-label="Settings" type="button">⚙️</button>
      </div>
      <div id="draw-dock" class="draw-dock" aria-label="Drawing tools">
        <button id="btn-draw" class="draw-main-btn" aria-label="Draw mode" type="button">✏️</button>
        <div id="draw-toolbar" class="draw-toolbar hidden" aria-label="Drawing tools">
          <button id="btn-draw-pen" class="draw-tool-btn active" type="button" aria-label="Pen">✏️</button>
          <button id="btn-draw-highlighter" class="draw-tool-btn" type="button" aria-label="Highlighter">🖍️</button>
          <button id="btn-draw-eraser" class="draw-tool-btn" type="button" aria-label="Eraser">🧽</button>
          <button id="btn-draw-eyedropper" class="draw-tool-btn" type="button" aria-label="Eyedropper">💧</button>
          <input id="draw-color" class="draw-color-input" type="color" value="#ffffff" aria-label="Drawing color" />
          <label class="draw-size-control" for="draw-size" aria-label="Brush size">
            <span>Size</span>
            <input id="draw-size" type="range" min="1" max="28" step="1" value="4" />
          </label>
          <button id="btn-draw-undo" class="draw-tool-btn" type="button" aria-label="Undo">↶</button>
          <button id="btn-draw-redo" class="draw-tool-btn" type="button" aria-label="Redo">↷</button>
          <button id="btn-draw-clear" class="draw-tool-btn draw-clear-btn" type="button" aria-label="Clear all drawings">🗑️</button>
        </div>
      </div>
        <div id="dnd-dock" class="dnd-dock" aria-label="DnD board tools">
          <button id="btn-dnd" class="draw-main-btn" aria-label="DnD tools" type="button">⚔️</button>
          <div id="dnd-toolbar" class="dnd-toolbar hidden" aria-label="DnD tools">
            <button id="btn-dnd-grid" class="dnd-tool-btn" type="button" aria-label="Toggle 5 ft grid">Grid</button>
            <select id="dnd-scene" class="dnd-select" aria-label="Pre-built scene"></select>
            <select id="dnd-asset" class="dnd-select" aria-label="Asset library"></select>
            <button id="btn-dnd-add" class="dnd-tool-btn" type="button" aria-label="Add selected asset">Add</button>
            <button id="btn-dnd-custom" class="dnd-tool-btn" type="button" aria-label="Create asset">New</button>
            <button id="btn-dnd-save" class="dnd-tool-btn" type="button" aria-label="Save selected asset to local library">Save</button>
            <button id="btn-dnd-smaller" class="dnd-tool-btn" type="button" aria-label="Make selected asset smaller">−</button>
            <button id="btn-dnd-larger" class="dnd-tool-btn" type="button" aria-label="Make selected asset larger">＋</button>
            <button id="btn-dnd-board" class="dnd-tool-btn" type="button" aria-label="Set board size">Board</button>
            <button id="btn-dnd-zoom-out" class="dnd-tool-btn" type="button" aria-label="Zoom out">🔍−</button>
            <button id="btn-dnd-zoom-in" class="dnd-tool-btn" type="button" aria-label="Zoom in">🔍＋</button>
            <select id="dnd-dice" class="dnd-select" aria-label="Dice to roll">
              <option value="1d4">1d4</option>
              <option value="1d6">1d6</option>
              <option value="1d8">1d8</option>
              <option value="1d10">1d10</option>
              <option value="1d12">1d12</option>
              <option value="1d20" selected>1d20</option>
              <option value="2d20">2d20</option>
              <option value="1d100">1d100</option>
            </select>
            <button id="btn-dnd-roll" class="dnd-tool-btn dnd-roll-btn" type="button" aria-label="Roll dice">Roll</button>
          </div>
        </div>
      <div id="video-tray" class="video-tray" aria-live="polite"></div>
      <canvas id="stage"></canvas>
      <div id="dnd-stats-card" class="dnd-stats-card hidden" aria-live="polite">
        <div class="dnd-stats-header">
          <div>
            <div id="dnd-stats-name" class="dnd-stats-name"></div>
            <div id="dnd-stats-type" class="dnd-stats-type"></div>
          </div>
          <button id="btn-dnd-stats-close" class="close-btn" aria-label="Close stats">✕</button>
        </div>
        <div id="dnd-stats-bars" class="dnd-stats-bars"></div>
        <div id="dnd-stats-abilities" class="dnd-stats-abilities"></div>
        <div id="dnd-stats-details" class="dnd-stats-details"></div>
      </div>
    </section>

  </div>

  <!-- ===== Settings sheet (slides in from right) ===== -->
  <div id="sheet-profile" class="sheet" aria-hidden="true">
      <div class="sheet-header">
          <h2>Settings</h2>
          <button id="btn-close-profile" class="close-btn" aria-label="Close">✕</button>
      </div>
      <div class="profile-preview-row">
          <div class="profile-preview-main">
              <div id="preview-dot" class="preview-dot"></div>
              <span id="preview-name" class="preview-name"></span>
          </div>
          <button id="btn-leave-lobby" class="btn btn-small btn-danger" type="button">Leave lobby</button>
      </div>
      <div class="field-group">
          <label for="input-name">Name</label>
          <input id="input-name" type="text" class="text-input" maxlength="20" autocomplete="off" />
      </div>
      <div class="field-group">
          <label>Color</label>
          <div id="picker-color" class="swatch-grid"></div>
      </div>
      <div class="field-group">
          <label>Icon</label>
          <div id="picker-icon" class="icon-grid"></div>
      </div>

      <div class="field-group app-update-group">
          <label>Lobby</label>
          <div class="join-row settings-code-row">
              <input id="settings-code-input" class="code-input" maxlength="12" autocapitalize="characters"
                     autocomplete="off" placeholder="CODE" inputmode="text" />
              <button id="btn-settings-join" class="btn btn-small" type="button">Join</button>
              <button id="btn-settings-host" class="btn btn-small btn-primary" type="button">Host</button>
          </div>
          <button id="btn-share-lobby" class="btn btn-small" type="button">Share current lobby</button>
          <p id="settings-lobby-status" class="status"></p>
      </div>

      <div class="field-group app-update-group">
          <label>Display</label>
          <div class="version-row">
              <span>Keep screen awake</span>
              <button id="btn-keep-awake" class="btn btn-small" type="button">Off</button>
          </div>

          <p id="wake-status" class="status"></p>
      </div>
      <div class="field-group app-update-group">
          <label>Notifications</label>
          <div class="version-row">
              <span>Notify when someone joins</span>
              <button id="btn-enable-notifications" class="btn btn-small" type="button">Enable</button>
          </div>
          <p id="notification-status" class="status"></p>
      </div>
      <div class="field-group app-update-group">
          <label>App</label>
          <div class="version-row">
              <span>Version <strong id="app-version">2.6.1</strong></span>
              <button id="btn-check-update" class="btn btn-small" type="button">Check for updates</button>
          </div>
          <p id="update-status" class="status"></p>
      </div>
  </div>

  <details id="online-dropdown" class="online-dropdown">
    <summary><span id="online-count">0</span> online</summary>
    <div id="online-list" class="online-list"></div>
  </details>

  <!-- ===== Chat panel (slides up from bottom) ===== -->
  <div id="panel-chat" class="chat-panel" aria-hidden="true">
    <div class="chat-header">
      <span>Chat</span>
      <button id="btn-close-chat" class="close-btn" aria-label="Close">✕</button>
    </div>
    <div id="chat-log" class="chat-log"></div>
    <div class="chat-input-row">
      <input id="chat-input" type="text" class="chat-text-input"
             placeholder="Message…" maxlength="200" autocomplete="off" />
      <button id="btn-send" class="btn btn-primary send-btn">↑</button>
    </div>
  </div>

  <!-- WebRTC wrapper + free signaling broker -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <!-- QR code rendering for the join link -->
  <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>

  <script src="js/peer-net.js?v=2.6.1"></script>
  <script src="js/games/digger.js?v=2.6.1"></script>
  <script src="js/games/air-hockey.js?v=2.6.1"></script>
  <script src="js/games/paint-panic.js?v=2.6.1"></script>
  <script src="js/games/tower.js?v=2.6.1"></script>
  <script src="js/games/snow-brawl.js?v=2.6.1"></script>
  <script src="js/games/gentle-rain.js?v=2.6.1"></script>
  <script src="js/app.js?v=2.6.1"></script>
</body>
</html>
