<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#12121f" />
  <title>browserP2P</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">

    <!-- ===== Menu ===== -->
    <section id="screen-menu" class="screen active">
      <h1 class="title">browser<span>P2P</span></h1>
      <p class="tagline">Phone-to-phone over your Wi-Fi. No install.</p>

      <button id="btn-host" class="btn btn-primary">Host a game</button>

      <div class="divider"><span>or join one</span></div>

      <div class="join-row">
        <input id="code-input" class="code-input" maxlength="4" autocapitalize="characters"
               autocomplete="off" placeholder="CODE" inputmode="text" />
        <button id="btn-join" class="btn">Join</button>
      </div>
      <p id="join-status" class="status"></p>
    </section>

    <!-- ===== Lobby (host) ===== -->
    <section id="screen-lobby" class="screen">
      <h2>Players join with this code</h2>
      <div class="code-big" id="lobby-code">----</div>
      <div id="qr" class="qr"></div>
      <p class="join-url-label">or open <span id="join-url"></span></p>

      <h3><span id="player-count">0</span> in the lobby</h3>
      <ul id="player-list" class="player-list"></ul>

      <button id="btn-start" class="btn btn-primary">Start</button>
    </section>

    <!-- ===== Play ===== -->
    <section id="screen-play" class="screen">
      <canvas id="stage"></canvas>
      <p class="hint">Drag your dot. Everyone sees everyone move.</p>
    </section>

  </div>

  <!-- WebRTC wrapper + free signaling broker -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <!-- QR code rendering for the join link -->
  <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>

  <script src="js/peer-net.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
