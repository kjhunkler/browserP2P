<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#12121f" />
  <title>browserP2P</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">

    <!-- ===== Menu ===== -->
    <section id="screen-menu" class="screen active">
      <h1 class="title">browser<span>P2P</span></h1>
      <p class="tagline">Phone-to-phone over your Wi-Fi. No install.</p>

      <button id="btn-auto" class="btn btn-primary btn-big">Play</button>
      <p id="auto-status" class="status">Finds or starts the game on your Wi-Fi.</p>

      <div class="divider"><span>advanced — use a code</span></div>

      <button id="btn-host" class="btn">Host with a code</button>

      <div class="join-row">
        <input id="code-input" class="code-input" maxlength="4" autocapitalize="characters"
               autocomplete="off" placeholder="CODE" inputmode="text" />
        <button id="btn-join" class="btn">Join</button>
      </div>
      <p id="join-status" class="status"></p>
    </section>

    <!-- ===== Lobby (host) ===== -->
    <section id="screen-lobby" class="screen">
      <h2>Players join with this code</h2>
      <div class="code-big" id="lobby-code">----</div>
      <div id="qr" class="qr"></div>
      <p class="join-url-label">or open <span id="join-url"></span></p>

      <h3><span id="player-count">0</span> in the lobby</h3>
      <ul id="player-list" class="player-list"></ul>

      <button id="btn-start" class="btn btn-primary">Start</button>
    </section>

    <!-- ===== Play ===== -->
    <section id="screen-play" class="screen">
      <canvas id="stage"></canvas>
      <button id="btn-profile" class="hud-btn hud-top-left" aria-label="Profile">🎨</button>
      <button id="btn-chat"    class="hud-btn hud-bottom-right" aria-label="Chat">
        💬<span id="chat-badge" class="badge hidden">0</span>
      </button>
    </section>

  </div>

  <!-- ===== Profile sheet (slides in from right) ===== -->
  <div id="sheet-profile" class="sheet" aria-hidden="true">
    <div class="sheet-header">
      <h2>Your Profile</h2>
      <button id="btn-close-profile" class="close-btn" aria-label="Close">✕</button>
    </div>
    <div class="profile-preview-row">
      <div id="preview-dot" class="preview-dot"></div>
      <span id="preview-name" class="preview-name"></span>
    </div>
    <div class="field-group">
      <label for="input-name">Name</label>
      <input id="input-name" type="text" class="text-input" maxlength="20" autocomplete="off" />
    </div>
    <div class="field-group">
      <label>Color</label>
      <div id="picker-color" class="swatch-grid"></div>
    </div>
    <div class="field-group">
      <label>Icon</label>
      <div id="picker-icon" class="icon-grid"></div>
    </div>
  </div>

  <!-- ===== Chat panel (slides up from bottom) ===== -->
  <div id="panel-chat" class="chat-panel" aria-hidden="true">
    <div class="chat-header">
      <span>Chat</span>
      <button id="btn-close-chat" class="close-btn" aria-label="Close">✕</button>
    </div>
    <div id="chat-log" class="chat-log"></div>
    <div class="chat-input-row">
      <input id="chat-input" type="text" class="chat-text-input"
             placeholder="Message…" maxlength="200" autocomplete="off" />
      <button id="btn-send" class="btn btn-primary send-btn">↑</button>
    </div>
    <div class="ptt-row">
      <button id="btn-ptt" class="ptt-btn" type="button">
        <span>🎤</span>
        <span id="ptt-label">Hold to talk</span>
      </button>
    </div>
  </div>

  <!-- WebRTC wrapper + free signaling broker -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <!-- QR code rendering for the join link -->
  <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>

  <script src="js/peer-net.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
